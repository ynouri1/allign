name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Lint et tests
  lint-and-test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🔍 Run ESLint
        run: npm run lint

      - name: 🧪 Run tests
        run: npm test
        env:
          CI: true

      - name: 📊 Upload test coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Job 2: Build de production
  build:
    name: 🏗️ Build Production
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build for production
        run: npm run build
        env:
          # Variables d'environnement de build (secrets seront dans Vercel/Netlify)
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📊 Analyze bundle size
        run: |
          echo "📦 Bundle Analysis:"
          find dist/assets -name "*.js" -exec basename {} \; | head -10
          du -sh dist/assets/*.js 2>/dev/null | sort -hr | head -10 || echo "No JS files found"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 30

  # Job 3: Validation finale et notification
  validation-success:
    name: ✅ Validation Success
    runs-on: ubuntu-latest
    needs: [lint-and-test, build]
    if: success()
    
    steps:
      - name: ✅ Validation completed
        run: |
          echo "🎉 CI/CD validation successful!"
          echo "✅ Lint, tests, and build completed successfully"
          echo "🚀 Vercel will automatically deploy from main branch"
          echo "📱 Production URL: https://allign.space"