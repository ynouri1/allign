<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0D9488" />
  <title>alignbygn — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8FFFE;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0) 1.5rem env(safe-area-inset-bottom, 0);
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin-bottom: 1.5rem;
      border-radius: 20px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0D9488;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 1rem;
      color: #64748b;
      max-width: 320px;
      line-height: 1.5;
      margin-bottom: 2rem;
    }
    button {
      background: #0D9488;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 48px;
      touch-action: manipulation;
      transition: opacity 0.15s;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <img src="/pwa-192x192.png" alt="alignbygn" class="icon" />
  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion Internet puis réessayez. Vos données seront synchronisées automatiquement à la reconnexion.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>
